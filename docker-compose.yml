services:
  # ############ API SERVER ############ #
  apiserver:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - database
    ports:
      - '8080:8080'
    environment:
      DATABASE_HOST: database
    networks:
      - dev-network

  # ############# DATABASE ############# #
  database:
    image: postgres:16.2-alpine3.19
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dev-network

  # ########### TEST DATABASE ########## #
  database-test:
    image: postgres:16.2-alpine3.19
    restart: always
    environment:
      POSTGRES_USER: ${TEST_DATABASE_USER}
      POSTGRES_PASSWORD: ${TEST_DATABASE_PASS}
      POSTGRES_DB: ${TEST_DATABASE_NAME}
    ports:
      - '${TEST_DATABASE_PORT}:5432'
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    networks:
      - dev-network

  # ############# METABASE ############# #
  metabase:
    image: metabase/metabase
    restart: always
    ports:
      - '${METABASE_PORT}:3000'
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      # Database configuration
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${DATABASE_NAME}
      MB_DB_HOST: database
      MB_DB_PORT: ${DATABASE_PORT}
      MB_DB_USER: ${DATABASE_USER}
      MB_DB_PASS: ${DATABASE_PASS}
      # Metabase configuration
      MB_SETUP_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL}
      MB_SETUP_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD}
      MB_SETUP_ADMIN_FIRST_NAME: ${METABASE_ADMIN_FIRST_NAME}
      MB_SETUP_ADMIN_LAST_NAME: ${METABASE_ADMIN_LAST_NAME}
      MB_ALLOW_SIGNUP: ${METABASE_ALLOW_SIGNUP}
    volumes:
      - metabase-data:/metabase-data
    networks:
      - dev-network

volumes:
  pgdata:
    driver: local
  pgdata-test:
    driver: local
  metabase-data:
    driver: local

networks:
  dev-network:
    driver: bridge
