name: CI

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize]
  push:
    branches: [develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run ts-check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: greenbin_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: ${{ secrets.CI_DATABASE_PASS }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        env:
          NODE_ENV: test
          SERVER_HOST: localhost
          SERVER_PORT: 8080
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASS: ${{ secrets.CI_DATABASE_PASS }}
          DATABASE_NAME: greenbin_test
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: 5432
          TEST_DATABASE_USER: test
          TEST_DATABASE_PASS: ${{ secrets.CI_TEST_DATABASE_PASS }}
          TEST_DATABASE_NAME: greenbin_test
          ACCESS_TOKEN: ${{ secrets.CI_ACCESS_TOKEN }}
          REFRESH_TOKEN: ${{ secrets.CI_REFRESH_TOKEN }}
          ACCESS_TOKEN_EXPIRES_IN: 10m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          RECAPTCHA_SECRET_KEY: ${{ secrets.CI_RECAPTCHA_KEY }}
          EMAIL_USER: test@example.com
          EMAIL_APP_PASSWORD: ${{ secrets.CI_EMAIL_PASS }}
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          CORS_ALLOWED_ORIGINS: localhost
        run: pnpm run test
